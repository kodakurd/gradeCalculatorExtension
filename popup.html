<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f8ff; min-width: 320px; max-width: 360px; color: #1a1a1a; }
    .header { background: #2563eb; padding: 18px 20px 16px; display: flex; align-items: center; gap: 10px; }
    .header-logo { width: 28px; height: 28px; background: rgba(255,255,255,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Source Serif 4', serif; font-weight: 600; font-size: 16px; color: white; flex-shrink: 0; }
    .header-title { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9); letter-spacing: 0.04em; text-transform: uppercase; }
    .score-section { background: white; padding: 20px 20px 16px; border-bottom: 1px solid #dbeafe; }
    .score-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #93c5fd; margin-bottom: 4px; }
    .score-main { display: flex; align-items: baseline; gap: 10px; }
    .score-number { font-family: 'Source Serif 4', serif; font-size: 48px; font-weight: 600; color: #2563eb; line-height: 1; }
    .score-letter { font-size: 18px; font-weight: 500; color: #555; }
    .score-meta { font-size: 12px; color: #93c5fd; margin-top: 6px; }
    .bar-section { background: white; padding: 0 20px 16px; border-bottom: 1px solid #dbeafe; }
    .grade-bar { display: flex; height: 5px; border-radius: 3px; overflow: hidden; gap: 2px; margin-bottom: 8px; }
    .bar-seg { height: 100%; border-radius: 2px; transition: flex 0.4s; }
    .bar-legend { display: flex; flex-wrap: wrap; gap: 8px 14px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .table-section { padding: 12px 0 8px; }
    .table-header { display: grid; grid-template-columns: 1fr 64px 40px; padding: 0 20px 6px; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #bfdbfe; border-bottom: 1px solid #dbeafe; }
    .table-row { display: grid; grid-template-columns: 1fr 64px 40px; padding: 8px 20px; border-bottom: 1px solid #eff6ff; align-items: center; }
    .table-row:last-child { border-bottom: none; }
    .row-emne { font-size: 13px; color: #1e3a8a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px; }
    .row-karakter { font-size: 13px; font-weight: 500; }
    .row-sp { font-size: 12px; color: #93c5fd; text-align: right; }
    .grade-A { color: #1a7a4a; } .grade-B { color: #1d4ed8; } .grade-C { color: #6b4fc2; }
    .grade-D { color: #c27a10; } .grade-E { color: #c24010; } .grade-F { color: #999; }
    .grade-other { color: #888; font-weight: 400; font-size: 12px; }
    .error { padding: 24px 20px; text-align: center; font-size: 13px; color: #93c5fd; line-height: 1.6; }
    .error strong { display: block; color: #1e3a8a; margin-bottom: 4px; font-size: 14px; }
  </style>


</head>
<body>
  <div class="header">
    <div class="header-logo">K</div>
    <span class="header-title">Karakterkalkulator</span>
  </div>
  <div id="innhold">
    <div class="score-section">
      <div class="score-label">Vektet snitt</div>
      <div class="score-main">
        <span class="score-number" id="avg-num">—</span>
        <span class="score-letter" id="avg-letter"></span>
      </div>
      <div class="score-meta" id="avg-meta">Laster...</div>
    </div>
    <div class="bar-section">
      <div class="grade-bar" id="grade-bar"></div>
      <div class="bar-legend" id="bar-legend"></div>
    </div>
    <div class="table-section">
      <div class="table-header">
        <span>Emne</span><span>Karakter</span><span style="text-align:right">SP</span>
      </div>
      <div id="tabell"></div>
    </div>
  </div>
  <div id="feil" style="display:none;" class="error">
    <strong>Ingen data funnet</strong>
    Gå til resultat-siden i StudentWeb og prøv igjen.
  </div>
  <script src="popup.js"></script>
</body>
</html>
