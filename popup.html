<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="header">
    <div class="header-logo">K</div>
    <span class="header-title">Karakterkalkulator</span>
    <span class="header-author">by Makosa Abbas</span>
  </div>

  <div id="innhold">
    <div class="score-section">
      <div class="score-label">Vektet snitt</div>
      <div class="score-main">
        <span class="score-number" id="avg-num">—</span>
        <span class="score-letter" id="avg-letter"></span>
      </div>
      <div class="score-meta" id="avg-meta">Laster...</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="oversikt">Oversikt</button>
      <button class="tab" data-tab="rediger">Rediger</button>
    </div>

    <div id="fane-oversikt">
      <div class="bar-section">
        <div class="grade-bar" id="grade-bar"></div>
        <div class="bar-legend" id="bar-legend"></div>
      </div>
      <div class="table-section">
        <div class="table-header">
          <span>Emne</span><span>Karakter</span><span>SP</span>
        </div>
        <div id="tabell"></div>
      </div>
    </div>

    <div id="fane-rediger" style="display:none">
      <div class="edit-list" id="edit-list"></div>
      <div class="edit-footer">
        <button class="nullstill-btn" id="nullstill-btn">Tilbakestill alle endringer</button>
      </div>
    </div>
  </div>

  <div id="feil" style="display:none" class="error">
    <strong>Ingen data funnet</strong>
    Gå til resultat-siden i StudentWeb og prøv igjen.
  </div>

  <script src="popup.js"></script>
</body>
</html>
